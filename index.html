<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />

    <meta
      property="og:description"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
    />
    <meta property="og:image:type" content="image/png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Dancing+Script:wght@400..700&family=Great+Vibes&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
      crossorigin
    />

    <!-- Detect dark mode preference and set the class before next-themes loads. This avoids a flash of unstyled content (FOUC) when the page loads. -->
    <script>
      try {
        let theme = localStorage.getItem("theme");
        if (theme === "system" || !theme) {
          let prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          theme = prefersDark ? "dark" : "light";
        }
        document.documentElement.classList.add(theme);
      } catch (e) {}
    </script>

    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/App.tsx"></script>
  </body>
</html>
